name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci

      - name: Lint
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run lint

      - name: Run tests
        if: ${{ hashFiles('package.json') != '' }}
        run: npm test

      - name: Docker build (validation only)
        run: docker build -t tradingqquant-sim:ci .
